<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .container {
            padding-right: 15px;
            padding-left: 15px;
            margin-right: auto;
            margin-left: auto;
            display: grid;
            width: 800px;
            height: 600px; /* Remove this when you begin adding content */
            grid-template-columns: 200px 1fr; /* sidebar will be fixed width of 200px, the main section will fill in remaining space */
            grid-template-rows: 80px 1fr 1fr 80px; /* header and footer have a fixed height of 80px, the sidebar and main section height will fill in remaining space */
        }
        header {
            background-color: red;
            grid-row: 1/2; /* start at row 1, stop before row 2 */
            grid-column: 1/3; /* start a column 1, stop before column 4 */
        }
        aside{
            background-color: yellow;
            grid-row: 2/4; /* start at row 2, stop before row 4 */
            grid-column: 1/2; /* start a column 1, stop before column 2 */
        }
        main {
            background-color: orange;
            grid-row: 2/4; /* start at row 2, stop before row 4 */
            grid-column: 2/3; /* start a column 2, stop before column 4 */
            display: grid; /* Used to organize the sections inside main */
            /* Creates 2x2 grid inside the main */
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        #s1 {
            background-color: green;
            grid-row: 1/2;
            grid-column: 1/3;
        }
        #s2 {
            background-color: purple;
            grid-row: 2/3;
            grid-column: 1/2;
        }
        #s3 {
            background-color: hotpink;
            grid-row: 2/3;
            grid-column: 2/3;
        }
        footer {
            background-color: blue;
            grid-row: 4/5; /* start at row 4, stop before row 5 */
            grid-column: 1/4; /* start a column 1, stop before column 4 */
        }
    </style>
</head>
<body>
<!-- See book_examples/ch10/06_numbered_lines.html for the author's example -->
<div class="container">
    <header></header>
    <aside></aside>
    <main>
        <section id="s1"></section>
        <section id="s2"></section>
        <section id="s3"></section>
    </main>
    <footer></footer>
</div>
</body>
</html>
