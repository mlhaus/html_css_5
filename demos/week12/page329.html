<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2 Row x 3 Column Grid</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
        }
        main > div {
            background-color: #C8DFEE;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        main {
            width: 800px;
            display: grid;
            grid-template-rows: repeat(4, 100px);
            /*grid-template-columns: repeat(3, 150px);*/
            /* This creates 3 columns*/
            /* The first column will be fixed width, The second and third columns have a flexible width */
            /* The second column will always be 30% of the grid's width */
            /* 1fr (fractional unit) means the third column takes up the remaining space */
            grid-template-columns: 100px 30% 1fr; 
            grid-gap: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <main>
        <div>Div 1</div>
        <div>Div 2</div>
        <div>Div 3</div>
        <div>Div 4</div>
        <div>Div 5</div>
        <div>Div 6</div>
        <div>Div 7</div>
        <div>Div 8</div>
        <div>Div 9</div>
        <div>Div 10</div>
        <div>Div 11</div>
        <div>Div 12</div>
    </main>
</div>
</body>
</html>
