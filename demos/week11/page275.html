<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>

        /* Cell phone width */
        @media only screen and (max-width: 795px) {
            body {
                background-color: red;
            }
        }
        /* Tablet width */
        @media only screen and (min-width: 796px) and (max-width: 920px) {
            body {
                background-color: yellow;
            }
        }

        /* Small laptop width */
        @media only screen and (min-width: 921px) and (max-width: 1140px) {
            body {
                background-color: blue;
            }
        }

        /* Wide laptop/Desktop width */
        @media only screen and (min-width: 1141px) {
            body {
                background-color: black
            }
        }

    </style>
</head>
<body>

</body>
</html>
