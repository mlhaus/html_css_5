<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row my-4">
            <div class="col-md-8">
                <h1>Contact</h1>
                <form action="#" method="post">
                    <div class="form-floating mb-3">
                        <input name="user_name" type="text" class="form-control" id="floatingName" placeholder="Your Name">
                        <label for="floatingName">Your Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input name="user_email" type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input name="subject" type="text" class="form-control" id="floatingSubject" placeholder="Subject">
                        <label for="floatingSubject">Subject</label>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea name="msg" style="height: 100px" class="form-control" placeholder="Leave a message here" id="floatingMessage"></textarea>
                        <label for="floatingMessage">Message</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
