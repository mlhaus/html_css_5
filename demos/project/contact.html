<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="header-footer.js"></script>
</head>
<body>
<header></header>
<main>
    <div class="container">
        <h2>Contact</h2>
        <div class="row my-4">
            <div class="col-md-8">
                <form id="contact" method="post">
                    <div class="form-floating mb-3">
                        <input name="user_name" type="text" class="form-control" id="floatingName" placeholder="Your Name">
                        <label for="floatingName">Your Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input name="user_email" type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input name="user_subject" type="text" class="form-control" id="floatingSubject" placeholder="Subject">
                        <label for="floatingSubject">Subject</label>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea name="user_msg" style="height: 100px" class="form-control" placeholder="Leave a message here" id="floatingMessage"></textarea>
                        <label for="floatingMessage">Message</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
</main>
<footer></footer>
</body>
</html>
