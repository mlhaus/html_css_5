<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
    * {
      max-width: 100%; /* no child element will be wider than it's parent element */
    }
    body {
      background-color: lightblue;
      font-family: Poppins, sans-serif;
      font-size: 1.25rem; /* 20px */
    }
    .container {
      /* These styles place the card in the middle of the page */
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background-color: white;
      width: 800px;
      /*height: 200px;*/
      display: flex; /* Places left and right columns side-by-side */
      flex-direction: row; /* this is the default setting */
    }
    .left-col {
      width: 40%;
      padding: 1.25rem;
      /*background-color: #44aaee;*/
    }
    .left-col h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .left-col p {
      line-height: 1.4;
    }
    .right-col {
      width: 60%;
      /*background-color: red;*/
    }
    /* These styles apply to small browsers */
    @media only screen and (max-width: 800px) {
      body {
        /*background-color: lightgreen;*/
      }
      .card {
        flex-direction: column-reverse; /* This stacks the columns vertically */
        width: 200px;
        /*height: 500px;*/
      }
      .left-col {
        width: 100%;
        height: 40%;
      }
      .right-col {
        width: 100%;
        height: 60%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="left-col">
      <h1>We're Coming Soon</h1>
      <p>Hello friends! We're currently building our new website. Add your email below to stay up-to-date with announcements and launch information.</p>
      <!-- TODO: Add a form to collect a user's email address -->
    </div>
    <div class="right-col">
      <img src="https://images.unsplash.com/photo-1569228488691-3e94a47d8f5d?q=80&w=600&h=450&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Laptop at a coffee shop">
    </div>
  </div>
</div>
</body>
</html>
